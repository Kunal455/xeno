services:
  # CRM Backend Service
  - type: web
    name: xeno-crm-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        placeholder: "Enter your MongoDB Atlas Connection URI"
      - key: GEMINI_API_KEY
        placeholder: "Enter your Gemini API key"
      - key: SMTP_HOST
        placeholder: "smtp.gmail.com"
      - key: SMTP_PORT
        placeholder: "587"
      - key: SMTP_USER
        placeholder: "Enter your Gmail address"
      - key: SMTP_PASS
        placeholder: "Enter your App-specific password"
      - key: SMTP_FROM
        placeholder: '"Xeno CRM" <your-email@gmail.com>'
      - key: CHANNEL_SERVICE_URL
        placeholder: "Enter the deployed Channel Service URL (e.g. https://xeno-channel-service.onrender.com)"

  # Simulated Channel Delivery Service
  - type: web
    name: xeno-channel-service
    env: node
    plan: free
    rootDir: channel-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CRM_WEBHOOK_URL
        placeholder: "Enter the CRM Backend URL followed by /api/receipt (e.g. https://xeno-crm-backend.onrender.com/api/receipt)"
